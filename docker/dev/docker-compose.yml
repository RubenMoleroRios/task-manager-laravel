services:
  task-manager-app:
    container_name: ${BACKEND_CONTAINER_NAME:-task_manager_backend}_dev
    image: ${BACKEND_IMAGE_NAME:-task-manager-laravel}:${IMAGE_TAG:-dev}
    build:
      context: ../..
      dockerfile: Dockerfile
      target: dev
    ports:
      - "${APP_HOST_PORT:-8000}:${APP_CONTAINER_PORT:-8000}"
    environment:
      APP_NAME: ${APP_NAME:-Task Manager Laravel}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-task-manager-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-task_manager}
      DB_USERNAME: ${DB_USERNAME:-task_manager}
      DB_PASSWORD: ${DB_PASSWORD:-task_manager}
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    volumes:
      - ../../app:/app/app
      - ../../bootstrap:/app/bootstrap
      - ../../config:/app/config
      - ../../database:/app/database
      - ../../public:/app/public
      - ../../resources:/app/resources
      - ../../routes:/app/routes
      - ../../tests:/app/tests
      - ../../artisan:/app/artisan
      - ../../composer.json:/app/composer.json
      - ../../composer.lock:/app/composer.lock
      - ../../package.json:/app/package.json
      - ../../package-lock.json:/app/package-lock.json
      - ../../phpunit.xml:/app/phpunit.xml
      - ../../vite.config.js:/app/vite.config.js
      - task-manager-vendor-dev:/app/vendor
      - task-manager-storage-dev:/app/storage
    depends_on:
      task-manager-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/up" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - net-backend

  task-manager-db:
    container_name: ${BACKEND_DB_CONTAINER_NAME:-task_manager_backend_db}
    image: mysql/mysql-server:8.0
    ports:
      - "${DB_HOST_PORT:-3307}:${DB_PORT:-3306}"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-task_manager_root}
      MYSQL_DATABASE: ${DB_DATABASE:-task_manager}
      MYSQL_USER: ${DB_USERNAME:-task_manager}
      MYSQL_PASSWORD: ${DB_PASSWORD:-task_manager}
    volumes:
      - task-manager-db-dev-vol:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - net-backend

networks:
  net-backend:
    driver: bridge

volumes:
  task-manager-db-dev-vol:
  task-manager-vendor-dev:
  task-manager-storage-dev:
