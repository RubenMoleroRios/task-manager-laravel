services:
  task-manager-app:
    container_name: ${BACKEND_CONTAINER_NAME:-task_manager_backend}_prod
    image: ${BACKEND_IMAGE_NAME:-task-manager-laravel}:${IMAGE_TAG:-prod}
    build:
      context: ../..
      dockerfile: Dockerfile
      target: prod
    restart: always
    ports:
      - "${APP_HOST_PORT:-8000}:${APP_CONTAINER_PORT:-8000}"
    environment:
      APP_NAME: ${APP_NAME:-Task Manager Laravel}
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-task-manager-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-task_manager}
      DB_USERNAME: ${DB_USERNAME:-task_manager}
      DB_PASSWORD: ${DB_PASSWORD:-task_manager}
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    depends_on:
      task-manager-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/up" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - net-backend

  task-manager-db:
    container_name: ${BACKEND_DB_CONTAINER_NAME:-task_manager_backend_db}
    image: mysql/mysql-server:8.0
    restart: always
    ports:
      - "${DB_HOST_PORT:-3307}:${DB_PORT:-3306}"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-task_manager_root}
      MYSQL_DATABASE: ${DB_DATABASE:-task_manager}
      MYSQL_USER: ${DB_USERNAME:-task_manager}
      MYSQL_PASSWORD: ${DB_PASSWORD:-task_manager}
    volumes:
      - task-manager-db-prod-vol:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - net-backend

networks:
  net-backend:
    driver: bridge

volumes:
  task-manager-db-prod-vol:
